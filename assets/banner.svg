<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="banner-title">
  <title id="banner-title">wiringMQ — GPIO / SPI / I²C for Mango Pi MQ_Quad</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1423"/>
      <stop offset="1" stop-color="#0d0a13"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c084fc" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="400" fill="url(#bg)"/>
  <rect width="1600" height="400" fill="url(#grid)"/>

  <!-- Left: title block -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="24" fill="#c084fc" letter-spacing="8">
      <tspan opacity="0.6">///</tspan> WIRING FOR SBC
    </text>
    <text x="0" y="90" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="110" font-weight="800" fill="#f5f3ff" letter-spacing="-4">
      wiringMQ
    </text>
    <text x="0" y="140" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="400" fill="#c9c5d3">
      GPIO · SPI · I²C  on the Mango Pi MQ_Quad
    </text>
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="140" height="30" rx="4" fill="#c084fc"/>
      <text x="70" y="20" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#1a1423" text-anchor="middle" letter-spacing="1">ALLWINNER H616</text>
      <rect x="150" y="0" width="80" height="30" rx="4" fill="none" stroke="#c084fc" stroke-width="1.5"/>
      <text x="190" y="20" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#c084fc" text-anchor="middle" letter-spacing="1">LGPL</text>
      <rect x="240" y="0" width="70" height="30" rx="4" fill="none" stroke="#c084fc" stroke-width="1.5"/>
      <text x="275" y="20" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#c084fc" text-anchor="middle" letter-spacing="1">C</text>
    </g>
  </g>

  <!-- Right: 40-pin header illustration -->
  <g transform="translate(920, 60)">
    <!-- board substrate -->
    <rect x="0" y="0" width="600" height="280" rx="10" fill="#221a30" stroke="#c084fc" stroke-width="1" opacity="0.9"/>
    <rect x="0" y="0" width="600" height="280" rx="10" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.15"/>

    <!-- board silk labels -->
    <text x="30" y="35" font-family="ui-monospace, monospace" font-size="12" fill="#c084fc" opacity="0.7">MQ_QUAD · 40-PIN</text>
    <text x="30" y="260" font-family="ui-monospace, monospace" font-size="10" fill="#c084fc" opacity="0.4">gpio readall</text>

    <!-- header outline -->
    <rect x="30" y="70" width="540" height="140" rx="4" fill="#0d0a13" stroke="#c084fc" stroke-width="1"/>

    <!-- 40 pins in 2x20 layout -->
    <g fill="#c084fc" filter="url(#glow)">
      <!-- row A (top): pins 1..39 odd -->
      <g id="rowA">
        <circle cx="55" cy="105" r="6"/>
        <circle cx="80" cy="105" r="6"/>
        <circle cx="105" cy="105" r="6"/>
        <circle cx="130" cy="105" r="6"/>
        <circle cx="155" cy="105" r="6"/>
        <circle cx="180" cy="105" r="6"/>
        <circle cx="205" cy="105" r="6"/>
        <circle cx="230" cy="105" r="6"/>
        <circle cx="255" cy="105" r="6"/>
        <circle cx="280" cy="105" r="6"/>
        <circle cx="305" cy="105" r="6"/>
        <circle cx="330" cy="105" r="6"/>
        <circle cx="355" cy="105" r="6"/>
        <circle cx="380" cy="105" r="6"/>
        <circle cx="405" cy="105" r="6"/>
        <circle cx="430" cy="105" r="6"/>
        <circle cx="455" cy="105" r="6"/>
        <circle cx="480" cy="105" r="6"/>
        <circle cx="505" cy="105" r="6"/>
        <circle cx="530" cy="105" r="6"/>
      </g>
      <!-- row B (bottom): pins 2..40 even -->
      <g id="rowB">
        <circle cx="55" cy="175" r="6"/>
        <circle cx="80" cy="175" r="6"/>
        <circle cx="105" cy="175" r="6"/>
        <circle cx="130" cy="175" r="6"/>
        <circle cx="155" cy="175" r="6"/>
        <circle cx="180" cy="175" r="6"/>
        <circle cx="205" cy="175" r="6"/>
        <circle cx="230" cy="175" r="6"/>
        <circle cx="255" cy="175" r="6"/>
        <circle cx="280" cy="175" r="6"/>
        <circle cx="305" cy="175" r="6"/>
        <circle cx="330" cy="175" r="6"/>
        <circle cx="355" cy="175" r="6"/>
        <circle cx="380" cy="175" r="6"/>
        <circle cx="405" cy="175" r="6"/>
        <circle cx="430" cy="175" r="6"/>
        <circle cx="455" cy="175" r="6"/>
        <circle cx="480" cy="175" r="6"/>
        <circle cx="505" cy="175" r="6"/>
        <circle cx="530" cy="175" r="6"/>
      </g>
    </g>

    <!-- labels: pin 1 / pin 40 corners -->
    <text x="55" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#c084fc" text-anchor="middle" opacity="0.7">1</text>
    <text x="530" y="195" font-family="ui-monospace, monospace" font-size="10" fill="#c084fc" text-anchor="middle" opacity="0.7">40</text>

    <!-- annotations for key peripherals -->
    <g font-family="ui-monospace, monospace" font-size="11" fill="#c9c5d3">
      <text x="80" y="230" text-anchor="middle" opacity="0.85">SDA</text>
      <text x="155" y="230" text-anchor="middle" opacity="0.85">SCL</text>
      <text x="230" y="230" text-anchor="middle" opacity="0.85">UART</text>
      <text x="405" y="230" text-anchor="middle" opacity="0.85">SPI</text>
    </g>
  </g>

  <!-- tiny signature at bottom -->
  <text x="80" y="370" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#c084fc" opacity="0.5">$ gpio -v · REevee0/wiringMQ</text>
</svg>
